<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title description">
  <title id="title">Documentation context read for one task</title>
  <desc id="description">Three grouped bar comparisons show a full-tree baseline at 100 percent and DocumentationEngine context packets at 1.88, 1.93, and 0.94 percent for architecture analysis, a roadmap phase, and research continuation. Required context coverage is 100 percent in all scenarios.</desc>
  <rect width="1200" height="760" fill="#ffffff"/>

  <text x="600" y="54" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Documentation context read for one task</text>
  <text x="600" y="84" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Real legacy corpus · 292 Markdown documents · 6.41 MB · lower is better</text>

  <rect x="350" y="108" width="18" height="18" rx="2" fill="#64748b"/>
  <text x="378" y="122" font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">Full-tree baseline (without DocumentationEngine)</text>
  <rect x="744" y="108" width="18" height="18" rx="2" fill="#16a34a"/>
  <text x="772" y="122" font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">DocumentationEngine context</text>

  <line x1="110" y1="570" x2="1120" y2="570" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="110" y1="470" x2="1120" y2="470" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="110" y1="370" x2="1120" y2="370" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="110" y1="270" x2="1120" y2="270" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="110" y1="170" x2="1120" y2="170" stroke="#e2e8f0" stroke-width="1"/>

  <text x="96" y="575" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">0%</text>
  <text x="96" y="475" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">25%</text>
  <text x="96" y="375" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">50%</text>
  <text x="96" y="275" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">75%</text>
  <text x="96" y="175" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">100%</text>

  <rect x="190" y="170" width="105" height="400" rx="5" fill="#64748b"/>
  <rect x="305" y="562.48" width="105" height="7.52" rx="3" fill="#16a34a"/>
  <text x="242.5" y="156" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">100%</text>
  <text x="357.5" y="550" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">1.88%</text>
  <text x="300" y="610" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Architecture analysis</text>
  <text x="300" y="636" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#15803d">98.12% less context</text>
  <text x="300" y="658" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">4 documents · 6 sections · 120.7 KB</text>

  <rect x="500" y="170" width="105" height="400" rx="5" fill="#64748b"/>
  <rect x="615" y="562.28" width="105" height="7.72" rx="3" fill="#16a34a"/>
  <text x="552.5" y="156" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">100%</text>
  <text x="667.5" y="550" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">1.93%</text>
  <text x="610" y="610" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Roadmap phase</text>
  <text x="610" y="636" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#15803d">98.07% less context</text>
  <text x="610" y="658" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">4 documents · 7 sections · 123.6 KB</text>

  <rect x="810" y="170" width="105" height="400" rx="5" fill="#64748b"/>
  <rect x="925" y="566.24" width="105" height="3.76" rx="2" fill="#16a34a"/>
  <text x="862.5" y="156" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">100%</text>
  <text x="977.5" y="550" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">0.94%</text>
  <text x="920" y="610" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Research continuation</text>
  <text x="920" y="636" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#15803d">99.06% less context</text>
  <text x="920" y="658" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">4 documents · 9 sections · 60.2 KB</text>

  <rect x="110" y="682" width="1010" height="58" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="615" y="702" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#166534">100% required coverage · verbatim Markdown · no summarization, compression or arbitrary truncation</text>
  <text x="615" y="720" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#166534">Every omitted H2 stays visible; full documents and addressable sections remain available on explicit request</text>
  <text x="615" y="735" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#475569">Measured UTF-8 response bytes · full-tree baseline = all Markdown source bytes · temporary unchanged-source shadow copy</text>
</svg>
